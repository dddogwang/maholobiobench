  - asset_id: block_thermostatic_bath
    display_name: Block thermostatic bath
    category: static_equipment
    source_class: BlockThermostaticBathObject
    source_xml: robosuite/models/assets/objects/block_thermostatic_bath.xml
    default_instances:
