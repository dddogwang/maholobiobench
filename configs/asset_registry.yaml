known_gaps:
  - duplicated_static_and_runtime_instrument_representations
  - missing_liquid_volume_dynamics
  - missing_tip_pickup_and_eject_state
  - missing_tube_cap_open_close_state
  - missing_sample_identity_and_contamination_state_in_runtime
  - missing_operation_states_for_static_instruments
  - contact_geometry_needs_runtime_validation_for_task_critical_assets
